<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO Pose Detection</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  font-family:sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.container {
  max-width:900px;
  background:white;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  padding:30px;
}
h1 { text-align:center; color:#333; margin-bottom:30px; font-weight:700;}
.card { border:none; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); margin-bottom:20px; transition:transform 0.3s ease;}
.card:hover { transform: translateY(-5px);}
.card-header { background: linear-gradient(90deg,#ff7e5f,#feb47b); color:white; font-weight:600; border-radius:10px 10px 0 0 !important; text-align:center;}
.btn { border-radius:25px; font-weight:600; transition:all 0.3s ease;}
#camera { border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.2); margin-top:15px;}
.loading { display:none; text-align:center; color:#007bff;}
.video-container { position:relative; width:100%; }
.overlay-corner {
  position:absolute;
  top:10px;
  right:10px;
  width:200px;
  height:auto;
  pointer-events:none;
  border:2px solid #fff;
  border-radius:10px;
  background:rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="container">
<h1><i class="bi bi-person-standing"></i> YOLO Pose Detection</h1>

<!-- Image Upload -->
<div class="card">
<div class="card-header"><i class="bi bi-images"></i> Detect Pose from Image</div>
<div class="card-body">
<input type="file" id="imageInput" accept="image/*" class="form-control mb-3">
<button id="uploadBtn" class="btn btn-primary w-100 mb-3"><i class="bi bi-upload"></i> Upload & Detect</button>
<div id="imageLoading" class="loading"><div class="spinner-border" role="status"></div> Processing...</div>
<div id="imageResults"></div>
</div>
</div>

<!-- Camera -->
<div class="card">
<div class="card-header"><i class="bi bi-camera-video"></i> Real-Time Camera</div>
<div class="card-body">
<button id="cameraToggle" class="btn btn-success w-100 mb-3"><i class="bi bi-camera"></i> Turn Camera On</button>
<div class="video-container">
  <video id="camera" autoplay muted style="width:100%; border-radius:10px;"></video>
  <canvas id="overlay" class="overlay-corner"></canvas>
</div>
<button id="captureBtn" class="btn btn-warning w-100 mt-3">📸 Capture Image</button>
<img id="capturedResult" class="img-fluid rounded mt-3" />
<div id="cameraLoading" class="loading"><div class="spinner-border" role="status"></div> Detecting...</div>
<div id="cameraResults"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let cameraOn = false;
let stream;
const video = document.getElementById("camera");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");
const toggleBtn = document.getElementById("cameraToggle");
const captureBtn = document.getElementById("captureBtn");

// Image Upload
document.getElementById('uploadBtn').addEventListener('click', function(){
    const file = document.getElementById('imageInput').files[0];
    if(!file){ alert('Select an image'); return; }

    const loading = document.getElementById('imageLoading');
    const results = document.getElementById('imageResults');
    loading.style.display='block'; results.innerHTML='';

    const formData = new FormData(); formData.append('image', file);

    fetch('/detect-image/', {method:'POST', body:formData})
    .then(res=>res.json())
    .then(data => {
        loading.style.display = 'none';
        results.innerHTML = `
            <div class="alert alert-success">Detection Complete!</div>
            <img src="data:image/jpeg;base64,${data.image}" class="img-fluid rounded mb-3"/>
            <pre>${JSON.stringify(data.poses,null,2)}</pre>
        `;
    })
    .catch(err=>{
        loading.style.display='none';
        results.innerHTML=`<div class="alert alert-danger">Error: ${err.message}</div>`;
    });
});

// Toggle camera
toggleBtn.onclick = () => {
  if(!cameraOn){
    navigator.mediaDevices.getUserMedia({ video:true })
      .then(s => {
        stream = s;
        video.srcObject = stream;
        cameraOn = true;
        toggleBtn.innerHTML = "❌ Turn Camera Off";
        toggleBtn.classList.replace("btn-success","btn-danger");

        video.onloadedmetadata = () => {
          overlay.width = 200; // corner width
          overlay.height = overlay.width * video.videoHeight / video.videoWidth;
          detectPose();
        };
      });
  } else {
    stream.getTracks().forEach(t=>t.stop());
    cameraOn = false;
    ctx.clearRect(0,0,overlay.width,overlay.height);
    toggleBtn.innerHTML = "📷 Turn Camera On";
    toggleBtn.classList.replace("btn-danger","btn-success");
  }
};

// Helper: get video frame as blob
function getFrameBlob(callback){
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const c = canvas.getContext('2d');
  c.drawImage(video,0,0);
  canvas.toBlob(blob=>callback(blob),'image/jpeg');
}

// Draw Pose overlay in corner
// Draw Pose overlay in corner
function drawPoseOverlay(data){
  if(!data.image) return;
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0,0,overlay.width, overlay.height);
    ctx.drawImage(img, 0, 0, overlay.width, overlay.height);
  };
  img.src = "data:image/jpeg;base64," + data.image;
}



// Live detection loop
function detectPose(){
  if(!cameraOn) return;
  getFrameBlob(blob=>{
    const formData = new FormData();
    formData.append("frame",blob);
    fetch("/detect-camera/",{method:"POST",body:formData})
      .then(res=>res.json())
      .then(data=>{
        drawPoseOverlay(data);
      });
  });
  setTimeout(detectPose,400);
}

// Capture button
captureBtn.onclick = ()=>{
  getFrameBlob(blob=>{
    const formData = new FormData();
    formData.append("image",blob);
    fetch("/detect-image/",{method:"POST",body:formData})
      .then(res=>res.json())
      .then(data=>{
        document.getElementById("capturedResult").src =
          "data:image/jpeg;base64,"+data.image;
      });
  });
};
</script>
</body>
</html>
